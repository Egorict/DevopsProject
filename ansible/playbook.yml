---
- name: Configure full server state (Docker, containers, Nginx, HTTPS)
  hosts: all
  connection: local
  become: yes
  vars:
    domain_name: apollonovaalisaviachislavovna.ru
    app_port: 8080
    admin_email: admin@apollonovaalisaviachislavovna.ru
    project_dir: /opt/myapp

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - git
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Remove existing Docker packages (to avoid conflicts)
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: yes
      failed_when: false

    - name: Install Docker using official script
      ansible.builtin.shell:
        cmd: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy project files to /opt/myapp
      ansible.builtin.shell:
        cmd: |
          rm -rf {{ project_dir }}/*
          cp -r ~/DevopsProject/* {{ project_dir }}/

    - name: Refresh and restart containers (force update)
      ansible.builtin.shell:
        cmd: |
          docker compose down --remove-orphans || true
          docker compose pull || true
          docker compose up -d --force-recreate --remove-orphans
        chdir: "{{ project_dir }}"
      changed_when: true

    - name: Copy nginx config for domain
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ domain_name }}
        owner: root
        group: root
        mode: '0644'

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ domain_name }}
        dest: /etc/nginx/sites-enabled/{{ domain_name }}
        state: link

    - name: Disable default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload nginx (pre-certbot)
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Obtain SSL certificate via Certbot
      ansible.builtin.shell:
        cmd: certbot --nginx -d {{ domain_name }} -d www.{{ domain_name }} --non-interactive --agree-tos --email {{ admin_email }} --redirect
      args:
        creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
      notify: Reload nginx

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded